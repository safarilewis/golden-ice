services:
  - type: web
    name: goldenice-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 8787
      - key: ALLOWED_ORIGINS
        sync: false
